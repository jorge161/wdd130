<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="poll-form.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Form - User Poll</title>
</head>
<body>
    <header>
    <h1>WDD 130 | Jorge Silva |HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for="fullname">Full name:</label>
                    <input type="text" id="fullname" name="fullname">
                </div>                
                <div class="form-item column2">
                    <label for="usermail">E-mail:</label>
                    <input type="email" name="username" id="usermail">
                </div>
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <label for="browser">What is your favorite iternet browser?</label>
                <select class="column1" name="browser" id="browser">
                    <option value="chrome">Chrome</option>
                    <option value="firefox">Firefox</option>
                    <option value="safari">safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="opera">Opera</option>
                    <option value="other">Other</option>
                </select>
                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
                <div class="form-item">
                    <label for="feedback" >List the places you have lived: </label>
                    <textarea name="feedback" id="feedback"   rows="4" placeholder="San pedro Sula, Tegucigalpa, Yoro, La Ceiba, Tocoa, Cortes"> </textarea>
                </div>
            </fieldset>
            <button type="submit" >Submit Poll</button>
        </form>
    </main>
    <footer>
        <p> &#169;2024 | HTML Form - User Activity</p>
    </footer>
    
</body>
</html>
