    <main>
        <form action="#" method="POST">
            <div>
                <label for="q1">Enter your complete name:</label>

            </div>
            <div>
                <label for="q2">Enter you e-mail:</label>

            <div>

            </div>
            <div>

            </div>

                <label for="option3">Website Suggestion</label>
            </div>
            <div class="form-item">
                <label for="feedback" >Write a message: </label>
                <textarea name="feedback" id="feedback"   rows="4" placeholder="Enter you message here"> </textarea>
            </div>
            <div class="form-item column1">
                <label for="pet">Please subscribe me to the monthly newslette</label>
                <input type="checkbox" id="pet" name="pet">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
